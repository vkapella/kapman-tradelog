    background:transparent;flex-shrink:0}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,

const RANGE_PRESETS = [
  { id:"all",    label:"All time" },
  { id:"ytd",    label:"YTD" },
  { id:"1yr",    label:"1 yr" },

  { id:"7d",     label:"7 day" },
  { id:"custom", label:"Custom…" },
];

function resolveRange(rangeId, customFrom, customTo) {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  function daysAgo(n) {
    const d = new Date(now); d.setDate(d.getDate() - n);
    return d.toISOString().slice(0,10);
  }
  switch(rangeId) {
    case "all":    return { from: null, to: null };
    case "ytd":    return { from: `${now.getFullYear()}-01-01`, to: today };
    case "1yr":    return { from: daysAgo(365),  to: today };
    case "3yr":    return { from: daysAgo(1095), to: today };
    case "30d":    return { from: daysAgo(30),   to: today };
    case "7d":     return { from: daysAgo(7),    to: today };
    case "custom": return { from: customFrom || null, to: customTo || null };
    default:       return { from: null, to: null };
  }
}

function dateInRange(dateStr, from, to) {
  if (!dateStr) return true;
  // dateStr may be "YYYY-MM-DD" or "YYYY-MM-DD HH:mm" — take first 10 chars
  const d = dateStr.slice(0,10);
  if (from && d < from) return false;
  if (to   && d > to)   return false;
  return true;
}

  rangeId: "all", setRangeId: ()=>{},
  customFrom: "", setCustomFrom: ()=>{},
  customTo: "",   setCustomTo: ()=>{},
  resolved: { from:null, to:null },
});

/* ─── COLUMN-FILTER POPOVER ────────────────────────────────────── */
function ColFilterPop({ options, active, onApply, onClose }) {
  const [search, setSearch] = useState("");
  const [sel, setSel] = useState(new Set(active));
  const ref = useRef(null);

  useEffect(() => {
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) onClose(); }
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose]);

  const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));
  const allSelected = filtered.length > 0 && filtered.every(o => sel.has(o));
  function toggle(v) { setSel(s => { const n=new Set(s); n.has(v)?n.delete(v):n.add(v); return n; }); }
  function toggleAll() {
    if (allSelected) setSel(s => { const n=new Set(s); filtered.forEach(o=>n.delete(o)); return n; });
    else setSel(s => { const n=new Set(s); filtered.forEach(o=>n.add(o)); return n; });
  }

  return (
    <div ref={ref} className="col-filter-pop">
      <input type="text" placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)} autoFocus />
      {filtered.length > 1 && (
        <label style={{ borderBottom:"1px solid var(--border-subtle)", marginBottom:4, paddingBottom:4 }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={{ accentColor:"var(--accent)" }} />
          <span style={{ color:"var(--text-3)", fontStyle:"italic" }}>Select all</span>
        </label>
      )}
      <div style={{ maxHeight:160, overflowY:"auto" }}>
        {filtered.map(o => (
          <label key={o}>
            <input type="checkbox" checked={sel.has(o)} onChange={() => toggle(o)} style={{ accentColor:"var(--accent)" }} />
            <span>{o}</span>
          </label>
        ))}
        {filtered.length === 0 && <span style={{ fontSize:11, color:"var(--text-3)", padding:"4px 2px", display:"block" }}>No matches</span>}
      </div>
      <div className="pop-footer">
        <Btn variant="accent" size="xs" onClick={() => { onApply([...sel]); onClose(); }}>Apply</Btn>
        <Btn variant="ghost" size="xs" onClick={() => { setSel(new Set()); onApply([]); onClose(); }}>Clear</Btn>
      </div>
    </div>
  );
}

/* ─── DATA TABLE with sticky headers + column filters ──────────── */
// Each row may have a `_raw` object with plain-string values used for filtering
// while the display value (row[col.id]) can be JSX. If _raw is absent, falls
// back to the cell value itself (works fine for string-only rows).
function DataTable({ columns, rows, stickyTop=0, maxH }) {
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState("desc");
  const [filters, setFilters] = useState({});
  const [openPop, setOpenPop] = useState(null);

  function toggleSort(id) {
    if (sortCol===id) setSortDir(d => d==="asc"?"desc":"asc");
    else { setSortCol(id); setSortDir("desc"); }
    setOpenPop(null);
  }

  // Helper: get the raw (plain string) value for a row+col, used for filter matching
  function rawVal(row, colId) {
    if (row._raw && row._raw[colId] != null) return String(row._raw[colId]);
    const v = row[colId];
    if (typeof v === "string") return v;
    if (typeof v === "number") return String(v);
    return null;
  }

  // Gather unique string options per filterable column (from raw values)
  const optMap = useMemo(() => {
    const m = {};
    columns.filter(c=>c.filter).forEach(c => {
      const vals = [...new Set(rows.map(r => rawVal(r, c.id)).filter(Boolean))].sort();
      m[c.id] = vals;
    });
    return m;
  }, [columns, rows]);

  // Apply column filters
  const filteredRows = useMemo(() => {
    const activeFilters = Object.entries(filters).filter(([,v]) => v?.length > 0);
    if (activeFilters.length === 0) return rows;
    return rows.filter(row =>
      activeFilters.every(([colId, allowed]) => {
        const v = rawVal(row, colId);
        return v != null && allowed.includes(v);
      })
    );
  }, [rows, filters]);

  const activeFilterKeys = Object.keys(filters).filter(k => filters[k]?.length > 0);

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1 }}>
      {/* Toolbar */}
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 12px", borderBottom:"1px solid var(--border)", background:"var(--surface)", flexShrink:0 }}>
        {activeFilterKeys.length > 0 && (
          <Badge variant="accent">{activeFilterKeys.length} filter{activeFilterKeys.length>1?"s":""} active</Badge>
        )}
        {activeFilterKeys.map(k => (
          <span key={k} style={{
            display:"inline-flex", alignItems:"center", gap:4,
            background:"var(--accent-dim)", border:"1px solid var(--accent-border)",
            borderRadius:4, padding:"1px 6px 1px 7px", fontSize:10.5, color:"var(--accent)",
          }}>
            {columns.find(c=>c.id===k)?.label || k}
            <button onClick={() => setFilters(f => ({...f, [k]:[]}))} style={{
              background:"none", border:"none", color:"var(--accent)", cursor:"pointer",
              fontSize:11, lineHeight:1, padding:"0 1px", opacity:0.7,
            }}>✕</button>
          </span>
        ))}
        {activeFilterKeys.length > 0 && (
          <Btn variant="ghost" size="xs" onClick={() => setFilters({})}>Clear all</Btn>
        )}
        <span style={{ flex:1 }} />
        <span style={{ color:"var(--text-3)", fontSize:11 }}>
          {filteredRows.length < rows.length
            ? <><span style={{color:"var(--accent)"}}>{filteredRows.length}</span> of {rows.length} rows</>
            : <>{rows.length} rows</>
          }
        </span>
      </div>
      {/* Table */}
      <div style={{ overflowX:"auto", overflowY: maxH ? "auto" : undefined, maxHeight: maxH }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr>
              {columns.map(col => (
                <th key={col.id} style={{
                  padding:`var(--hdr-py) var(--cell-px)`,
                  textAlign: col.right ? "right" : "left",
                  color: filters[col.id]?.length > 0 ? "var(--accent)" : "var(--text-3)",
                  fontWeight:600, fontSize:10.5,
                  letterSpacing:"0.05em", textTransform:"uppercase",
                  borderBottom:"1px solid var(--border)",
                  background:"var(--surface)",
                  position:"sticky", top:stickyTop, zIndex:10,
                  whiteSpace:"nowrap",
                  userSelect:"none",
                }}>
                  <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent: col.right?"flex-end":"flex-start", position:"relative" }}>
                    {/* sort trigger */}
                    <span onClick={col.sortable ? () => toggleSort(col.id) : undefined}
                      style={{ cursor: col.sortable?"pointer":"default", display:"flex", alignItems:"center", gap:3 }}>
                      {col.label}
                      {col.sortable && (
                        <span style={{ opacity: sortCol===col.id?1:0.25, fontSize:9 }}>
                          {sortCol===col.id && sortDir==="asc" ? "↑" : "↓"}
                        </span>
                      )}
                    </span>
                    {/* column filter button — Excel-style funnel */}
                    {col.filter && (
                      <button
                        onClick={(e) => { e.stopPropagation(); setOpenPop(openPop===col.id ? null : col.id); }}
                        title="Filter column"
                        style={{
                          background: filters[col.id]?.length>0 ? "var(--accent-dim)" : "transparent",
                          border: filters[col.id]?.length>0 ? "1px solid var(--accent-border)" : "1px solid transparent",
                          borderRadius:3, cursor:"pointer", padding:"1px 4px", lineHeight:1,
                          color: filters[col.id]?.length>0 ? "var(--accent)" : "var(--text-3)",
                          fontSize:10, display:"inline-flex", alignItems:"center",
                        }}
                      >
                        {/* funnel SVG icon */}
                        <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor">
                          <path d="M1 1h8L6 5v3.5l-2-1V5L1 1z"/>
                        </svg>
                        {filters[col.id]?.length>0 && (
                          <span style={{ fontSize:8.5, marginLeft:2, fontFamily:"var(--mono)" }}>
                            {filters[col.id].length}
                          </span>
                        )}
                      </button>
                    )}
                    {openPop===col.id && (
                      <ColFilterPop
                        options={optMap[col.id] || []}
                        active={filters[col.id] || []}
                        onApply={vals => setFilters(f => ({...f, [col.id]: vals}))}
                        onClose={() => setOpenPop(null)}
                      />
                    )}
                  </div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filteredRows.length === 0 ? (
              <tr>
                <td colSpan={columns.length} style={{ padding:"32px 14px", textAlign:"center", color:"var(--text-3)", fontSize:12 }}>
                  No rows match the current filters.
                </td>
              </tr>
            ) : filteredRows.map((row, i) => (
              <tr key={i} style={{ borderBottom:"1px solid var(--border-subtle)", height:"var(--row-h)" }}
                onMouseEnter={e => e.currentTarget.style.background="var(--surface-2)"}
                onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                {columns.map(col => (
                  <td key={col.id} style={{
                    padding:`var(--cell-py) var(--cell-px)`,
                    textAlign: col.right?"right":"left",
                    color:"var(--text)", whiteSpace:"nowrap",
                    fontFamily: col.mono?"var(--mono)":"var(--sans)",
                    fontSize: col.mono ? 11 : 12,
                  }}>{row[col.id]}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Pagination({ page, total, pageSize }) {
  const pages = Math.max(1, Math.ceil(total/pageSize));
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 12px", borderTop:"1px solid var(--border)", fontSize:11, color:"var(--text-3)", flexShrink:0 }}>
      <span>Page {page} of {pages} &nbsp;·&nbsp; {total} rows</span>
      <div style={{ display:"flex", gap:5 }}>
        <Btn variant="outline" size="xs" disabled={page<=1}>Prev</Btn>
        <Btn variant="outline" size="xs" disabled={page>=pages}>Next</Btn>
      </div>
    </div>
  );
}

                <Btn variant="outline" size="sm" onClick={doRebuild} disabled={rebuilding}>{rebuilding?"Rebuilding…":"Rebuild Ledger"}</Btn>
              </div>
            </Panel>
            {rebuildMsg && <div style={{background:"var(--accent-dim)",border:"1px solid var(--accent-border)",borderRadius:"var(--r)",padding:"9px 13px",fontSize:12,color:"var(--accent)"}}>{rebuildMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Panel style={{padding:14}}>
                <p style={{fontWeight:600,marginBottom:11,fontSize:12}}>Create Adjustment</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                  {[["Account","Select"],["Symbol","SDS"],["Effective Date",""],["Type","SPLIT"]].map(([lbl,ph])=>(
                    <label key={lbl} style={{fontSize:11,color:"var(--text-3)",display:"flex",flexDirection:"column",gap:3}}>
                      {lbl}
                      {lbl==="Account"||lbl==="Type"
                        ? <select style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}><option>{ph}</option></select>
                        : <input type={lbl==="Effective Date"?"date":"text"} placeholder={ph} style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}/>
                      }
                    </label>
                  ))}
                  <label style={{fontSize:11,color:"var(--text-3)",display:"flex",flexDirection:"column",gap:3}}>Ratio From<input type="number" defaultValue={2} style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}/></label>
                  <label style={{fontSize:11,color:"var(--text-3)",display:"flex",flexDirection:"column",gap:3}}>Ratio To<input type="number" defaultValue={1} style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}/></label>
                  <label style={{fontSize:11,color:"var(--text-3)",display:"flex",flexDirection:"column",gap:3,gridColumn:"span 2"}}>Reason (required)<input placeholder="Corporate action reconciliation" style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}/></label>
                  <label style={{fontSize:11,color:"var(--text-3)",display:"flex",flexDirection:"column",gap:3,gridColumn:"span 2"}}>Evidence URL<input placeholder="https://…" style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"4px 7px",color:"var(--text)",fontSize:12}}/></label>
                </div>
                <div style={{display:"flex",gap:7,marginTop:11}}>
                  <Btn variant="outline" size="sm">Preview</Btn>
                  <Btn variant="accent" size="sm">Create Adjustment</Btn>
                </div>
              </Panel>
              <Panel style={{padding:14}}>
                <p style={{fontWeight:600,marginBottom:9,fontSize:12}}>Preview</p>
                <p style={{fontSize:11,color:"var(--text-3)"}}>Run preview to see before/after impact.</p>
              </Panel>
            </div>
            <Panel style={{overflow:"hidden"}}>
              <PanelHeader title="Adjustment Ledger"/>
              <DataTable columns={adjCols} rows={adjRows}/>
              <Pagination page={1} total={2} pageSize={25}/>
            </Panel>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ─── SCREEN: DIAGNOSTICS ──────────────────────────────────────── */
function DiagnosticsScreen() {
  const diags=[
    {label:"Parse Coverage",        value:"98.2%", variant:"pos"},
    {label:"Unsupported Rows",      value:"6",     variant:"neutral"},
    {label:"Matching Coverage",     value:"96.5%", variant:"pos"},
    {label:"Uncategorized Setups",  value:"2",     variant:"neutral"},
    {label:"Warning Count",         value:"3",     variant:"warn"},
    {label:"Synthetic Expires",     value:"6",     variant:"warn"},
    {label:"Setup Inference Total", value:"63",    variant:"accent"},
    {label:"Short Call Standalone", value:"4",     variant:"neutral"},
    {label:"Short Call Paired",     value:"18",    variant:"neutral"},
    {label:"Pair Outcomes V/C/D",   value:"42/18/3",variant:"neutral"},
    {label:"Pair Failures",         value:"2",     variant:"neg"},
    {label:"Pair Ambiguities",      value:"4",     variant:"warn"},
  ];
  const warnings=[
    {title:"Expiration Inferred (EXPIRATION_INFERRED)", count:6, summary:"Expiration events were synthesized because the broker statement lacked an explicit EXPIRE row."},
    {title:"Unknown Effect", count:2, summary:"Executions with effect=UNKNOWN could not be classified as TO_OPEN or TO_CLOSE."},
    {title:"Parse Skipped — Unsupported Row Format", count:1, summary:"1 row in import i9j0k1l2 matched no known pattern for the Fidelity adapter."},
  ];
  return (
    <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:7}}>
        {diags.map(d=><KpiCard key={d.label} label={d.label} value={d.value} variant={d.variant}/>)}
      </div>
      <Panel style={{padding:0}}>
        <PanelHeader title="Warning Signals"/>
        {warnings.map((w,i)=>(
          <div key={i} style={{padding:"11px 14px",borderBottom:i<warnings.length-1?"1px solid var(--border-subtle)":"none",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
            <div>
              <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:500}}>{w.title}</span>
                <Badge variant="warn">{w.count}</Badge>
              </div>
              <p style={{fontSize:11,color:"var(--text-3)",lineHeight:1.6,maxWidth:540}}>{w.summary}</p>
            </div>
            <Btn variant="outline" size="xs">Open case file</Btn>
          </div>
        ))}
      </Panel>
    </div>
  );
}

/* ─── SCREEN: TTS EVIDENCE ─────────────────────────────────────── */
function TtsScreen() {
  const metrics=[
    {label:"Trades Per Month",       value:"82",          target:"≥ 60",    ok:true,  desc:"Monthly execution count averaged over the period in scope."},
    {label:"Active Days / Week",     value:"4.3",         target:"≥ 4",     ok:true,  desc:"Average days per week with at least one execution."},
    {label:"Avg Holding Period",     value:"14.2d",       target:"≤ 31d",   ok:true,  desc:"Mean holdingDays across all matched lots in scope."},
    {label:"Annualized Trade Count", value:"984",         target:"≥ 720",   ok:true,  desc:"Annualized rate of executions based on activity in scope."},
    {label:"Median Holding Period",  value:"9.0d",        target:"info",    ok:null,  desc:"Median holdingDays — informational, not a TTS criterion."},
    {label:"Gross Trading Proceeds", value:"$482,900",    target:"info",    ok:null,  desc:"Sum of gross proceeds from all closing executions in scope."},
  ];
  const holdDist=[38,55,72,48,30,18,8,4,2];
  const holdLabels=["0-1d","2-5d","6-10d","11-20d","21-30d","31-60d","61-90d","91-180d","180d+"];
  const maxH=Math.max(...holdDist);
  return (
    <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <Badge variant="pos">READY</Badge>
        <span style={{fontSize:13,color:"var(--text-2)"}}>Trader Tax Status readiness metrics</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
        {metrics.map(m=>(
          <Panel key={m.label} style={{padding:13}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:10,color:"var(--text-3)",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>{m.label}</span>
              <Badge variant={m.ok===true?"pos":m.ok===false?"neg":"neutral"}>{m.target}</Badge>
            </div>
            <div style={{fontSize:20,fontWeight:600,fontFamily:"var(--mono)",color:m.ok===true?"var(--pos)":m.ok===false?"var(--neg)":"var(--text)",marginBottom:5,letterSpacing:"-0.02em"}}>{m.value}</div>
            <p style={{fontSize:11,color:"var(--text-3)",lineHeight:1.6}}>{m.desc}</p>
          </Panel>
        ))}
      </div>
      <Panel style={{padding:0}}>
        <PanelHeader title="Holding Period Distribution"/>
        <div style={{padding:"16px 18px"}}>
          <svg width="100%" height={110} viewBox={`0 0 ${holdDist.length*60} 110`} preserveAspectRatio="none">
            {holdDist.map((v,i)=>{
              const bH=(v/maxH)*82;
              const color=i<2?"var(--pos)":i<5?"var(--warn)":"var(--neg)";
              return (
                <g key={i}>
                  <rect x={i*60+5} y={100-bH} width={50} height={bH} fill={color} rx="3" opacity="0.82"/>
                  <text x={i*60+30} y={108} textAnchor="middle" fontSize="8.5" fill="var(--text-3)" fontFamily="var(--sans)">{holdLabels[i]}</text>
                  <text x={i*60+30} y={100-bH-4} textAnchor="middle" fontSize="8.5" fill={color} fontFamily="var(--mono)">{v}</text>
                </g>
              );
            })}
          </svg>
        </div>
      </Panel>
    </div>
  );
}

/* ─── SIDEBAR ──────────────────────────────────────────────────── */
function Sidebar({ active, onNav, collapsed }) {
  return (
    <div style={{
      width: collapsed ? 44 : "var(--sidebar-w)", flexShrink:0,
      background:"var(--surface)", borderRight:"1px solid var(--border)",
      display:"flex", flexDirection:"column",
      transition:"width 0.18s ease", overflow:"hidden",
    }}>
      <div style={{padding:"0 14px",height:"var(--topbar-h)",display:"flex",alignItems:"center",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        {collapsed
          ? <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:14,color:"var(--accent)"}}>K</span>
          : <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:14,color:"var(--text)",letterSpacing:"-0.03em"}}>
              <span style={{color:"var(--accent)"}}>Kap</span>Man
            </span>
        }
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
        {NAV.map(group=>(
          <div key={group.group} style={{marginBottom:3}}>
            {!collapsed && (
              <div style={{padding:"6px 14px 2px",fontSize:9.5,fontWeight:700,color:"var(--text-3)",letterSpacing:"0.10em"}}>{group.group}</div>
            )}
            {group.items.map(item=>(
              <button key={item.id} onClick={()=>onNav(item.id)} style={{
                width:"100%", display:"flex", alignItems:"center", gap:7,
                padding: collapsed?"7px 11px":"6px 14px",
                background: active===item.id ? "var(--accent-dim)" : "transparent",
                border:"none",
                borderLeft: active===item.id ? "2px solid var(--accent)" : "2px solid transparent",
                color: active===item.id ? "var(--accent)" : "var(--text-2)",
                fontSize:12, fontWeight: active===item.id ? 500 : 400,
                cursor:"pointer", textAlign:"left",
                transition:"all 0.1s",
              }}
              onMouseEnter={e=>{ if(active!==item.id) e.currentTarget.style.background="var(--surface-2)"; }}
              onMouseLeave={e=>{ if(active!==item.id) e.currentTarget.style.background="transparent"; }}>
                {!collapsed && <span style={{flex:1,whiteSpace:"nowrap"}}>{item.label}</span>}
                {!collapsed && item.badge!=null && (
                  <span style={{fontSize:10,fontFamily:"var(--mono)",background:"var(--surface-3)",color:"var(--text-3)",padding:"1px 5px",borderRadius:3}}>{item.badge}</span>
                )}
                {collapsed && <span title={item.label} style={{fontSize:12,fontWeight:600}}>{item.label[0]}</span>}
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── TOPBAR ───────────────────────────────────────────────────── */
function Topbar({ route, collapsed, onToggle }) {
  const LABELS={dashboard:"Dashboard",analytics:"Analytics",positions:"Open Positions",trade:"Executions / Lots / Setups",imports:"Imports & Connections",ledger:"Ledger Admin",tts:"TTS Evidence",diagnostics:"Diagnostics"};
  const tags = CONTEXT_TAGS[route] || [];
  return (
    <div style={{height:"var(--topbar-h)",display:"flex",alignItems:"center",padding:"0 14px",borderBottom:"1px solid var(--border)",background:"var(--surface)",gap:9,flexShrink:0}}>
      <button onClick={onToggle} style={{background:"transparent",border:"none",color:"var(--text-3)",cursor:"pointer",fontSize:15,padding:"2px 4px",lineHeight:1}}>☰</button>
      <span style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{LABELS[route]||route}</span>
      <div style={{display:"flex",gap:5,alignItems:"center"}}>
        {tags.map(t=><Badge key={t} variant="neutral">{t}</Badge>)}
      </div>
      <span style={{flex:1}}/>
      <RangeSelector />
      <div style={{width:1,height:18,background:"var(--border)"}}/>
      <AccountSelector />
      <div style={{width:1,height:18,background:"var(--border)",marginLeft:2}}/>
      <div style={{width:26,height:26,borderRadius:"50%",background:"var(--accent-dim)",border:"1px solid var(--accent-border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--accent)",fontWeight:700,fontFamily:"var(--mono)"}}>KM</div>
    </div>
  );
}

/* ─── APP ROOT ─────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [activeAcct, setActiveAcct] = useState("all");
  const [rangeId, setRangeId] = useState("all");
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const resolved = useMemo(() => resolveRange(rangeId, customFrom, customTo), [rangeId, customFrom, customTo]);

  useEffect(() => {
    const a = ACCENTS[tweaks.accent] || ACCENTS.cyan;
    document.documentElement.style.setProperty("--accent",        a.main);
    document.documentElement.style.setProperty("--accent-dim",    a.dim);
    document.documentElement.style.setProperty("--accent-border", a.border);
  }, [tweaks.accent]);

  useEffect(() => {
    const d = tweaks.density;
    document.documentElement.style.setProperty("--row-h",   d==="compact"?"28px":d==="spacious"?"40px":"34px");
    document.documentElement.style.setProperty("--cell-py", d==="compact"?"4px":d==="spacious"?"10px":"7px");
    document.documentElement.style.setProperty("--hdr-py",  d==="compact"?"4px":d==="spacious"?"10px":"7px");
    document.documentElement.style.setProperty("--r",       d==="compact"?"4px":d==="spacious"?"12px":"7px");
    document.documentElement.style.setProperty("--r-sm",    d==="compact"?"3px":d==="spacious"?"8px":"4px");
  }, [tweaks.density]);

  function renderScreen() {
    switch(route) {
      case "dashboard":    return <DashboardScreen/>;
      case "analytics":    return <AnalyticsScreen/>;
      case "positions":    return <PositionsScreen/>;
      case "trade":        return <TradeRecordsScreen/>;
      case "imports":      return <ImportsScreen/>;
      case "ledger":       return <LedgerAdminScreen/>;
      case "tts":          return <TtsScreen/>;
      case "diagnostics":  return <DiagnosticsScreen/>;
      default:             return <DashboardScreen/>;
    }
  }

  return (
    <DateRangeCtx.Provider value={{ rangeId, setRangeId, customFrom, setCustomFrom, customTo, setCustomTo, resolved }}>
    <AccountCtx.Provider value={{ activeAcct, setActiveAcct }}>
      <Sidebar active={route} onNav={setRoute} collapsed={collapsed}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        <Topbar route={route} collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)}/>
        <div style={{flex:1,overflowY:"auto"}}>
          {renderScreen()}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Accent Color">
          <TweakRadio label="Hue" value={tweaks.accent} onChange={v=>setTweak("accent",v)}
            options={["cyan","blue","violet","amber","green"].map(v=>({value:v,label:v.charAt(0).toUpperCase()+v.slice(1)}))}/>
        </TweakSection>
        <TweakSection label="Information Density">
          <TweakRadio label="Rows" value={tweaks.density} onChange={v=>setTweak("density",v)}
            options={[{value:"compact",label:"Compact"},{value:"normal",label:"Normal"},{value:"spacious",label:"Spacious"}]}/>
        </TweakSection>
      </TweaksPanel>
    </AccountCtx.Provider>
    </DateRangeCtx.Provider>
  );
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App/>);
</script>
</body>
</html>
